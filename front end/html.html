<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fala Floripa</title>

    <link rel="stylesheet" href="css.css">
</head>
<body>

    <div class="container">

        <aside class="sidebar">

            <div class="perfil-box">

                <img
                    id="fotoPerfil"
                    src="https://placehold.co/200x200"
                    alt="perfil"
                >

                <h2 id="nomeUsuario">Visitante</h2>

                <p id="bairroUsuario">Não logado</p>

            </div>

            <button id="abrirModal">
                Login / Cadastro
            </button>

            <button id="btnPerfil">
                Ver Perfil
            </button>

        </aside>

        <main class="feed">

            <header class="topbar">
                <h1>Fala Floripa</h1>
            </header>

            <section class="criar-post">

                <h2>Registrar ação</h2>

                <form id="postForm">

                    <input
                        type="text"
                        name="titulo"
                        placeholder="Título"
                        required
</html>
